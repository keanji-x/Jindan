# ============================================================
# Jindan — 修仙世界模拟器 Docker Compose
# 一键部署：Caddy (反代) + Core API + PostgreSQL
# ============================================================
#
# 部署步骤:
#   1. 编辑 packages/core/.env
#   2. just start_docker
#
# ============================================================

services:
  # ── Caddy 反向代理 (自动 HTTPS) ─────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: packages/core/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - core

  # ── PostgreSQL 数据库 ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jindan
      POSTGRES_USER: jindan
      POSTGRES_PASSWORD: ${PG_PASSWORD:-jindan_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jindan -d jindan"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── 金丹世界 API 服务器 ──────────────────────────────────
  core:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    env_file: packages/core/.env
    environment:
      DATABASE_URL: postgresql://jindan:${PG_PASSWORD:-jindan_secret}@postgres:5432/jindan
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
  caddy_data:
  caddy_config:
