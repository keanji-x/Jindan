<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金丹 · 修仙世界</title>
  <meta name="description" content="修仙世界模拟器 — 实时面板">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div id="app-container">
    <header class="glass-header">
      <div class="header-left">
        <h1 class="glow-text">金丹 · 修仙录</h1>
      </div>
      <div class="header-right">
        <div class="world-tick-box">
          <span class="label">纪日</span>
          <span id="glb-tick" class="value glow-value">0</span>
        </div>
        <div id="connection-status" class="status-indicator disconnected">
          <span class="status-dot"></span>
          <span class="status-text">灵网断接</span>
        </div>
      </div>
    </header>

    <main>
      <!-- ==============================================
           TOP SECTION: GLOBAL DASHBOARD
           ============================================== -->
      <section id="top-board" class="dashboard-section">
        
        <!-- Qi Distribution -->
        <!-- Qi Distribution -->
        <div class="glass-panel qi-pool-panel" style="grid-column: span 1;">
          <h2 class="section-title">天地大千源气</h2>
          <div class="qi-visualizer">
             <!-- Legends Left -->
             <div class="qi-legend left-legend">
                <div class="legend-item"><span class="dot qi-dot"></span>游离灵气<br><strong id="val-ambient-qi" class="legend-val">0</strong></div>
                <div class="legend-item"><span class="dot body-dot"></span>众生之气<br><strong id="val-entity-qi" class="legend-val">0</strong></div>
                <div class="population-stats" style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); text-align: right;">
                  <div>生灵总数: <b id="glb-pop-total" style="color:var(--text-primary);">0</b></div>
                </div>
             </div>

             <!-- Concentric Rings (Pie Charts) -->
             <div class="concentric-rings">
               <svg viewBox="0 0 140 140" role="img" aria-labelledby="concentric-ring-title">
                 <title id="concentric-ring-title">双极灵池光环</title>
                 
                 <!-- Outer Ring (Radius=55, C=345.57) -->
                 <circle class="ring-bg" cx="70" cy="70" r="55"></circle>
                 <circle id="slice-ambient-qi" class="ring-fill slice-ambient qi-fill" cx="70" cy="70" r="55" transform="rotate(-90 70 70)"></circle>
                 <circle id="slice-entity-qi" class="ring-fill slice-body body-fill" cx="70" cy="70" r="55" transform="rotate(-90 70 70)"></circle>
                 
                 <!-- Inner Ring (Radius=38, C=238.76) -->
                 <circle class="ring-bg" cx="70" cy="70" r="38"></circle>
                 <circle id="slice-ling-qi" class="ring-fill slice-ling ling-fill" cx="70" cy="70" r="38" transform="rotate(-90 70 70)"></circle>
                 <circle id="slice-sha-qi" class="ring-fill slice-sha sha-fill" cx="70" cy="70" r="38" transform="rotate(-90 70 70)"></circle>
               </svg>
               <!-- Center Label (Total Qi) -->
               <div class="qi-ring-content">
                 <div class="total-label">宇宙总气</div>
                 <div id="val-total-qi" class="total-value">0</div>
               </div>
             </div>
             
             <!-- Legends Right -->
             <div class="qi-legend right-legend">
                <div class="legend-item"><span class="dot ling-dot"></span>天地正气<br><strong id="val-ling-qi" class="legend-val">0</strong></div>
                <div class="legend-item"><span class="dot sha-dot"></span>天地煞气<br><strong id="val-sha-qi" class="legend-val">0</strong></div>
             </div>
          </div>
        </div>

        <!-- Leaderboard -->
        <div class="glass-panel leaderboard-panel">
          <h2 class="section-title">天骄榜 (Top Cultivators)</h2>
          <div class="list-headers">
             <span>修仙者</span>
             <span>境界</span>
             <span>战力</span>
          </div>
          <div id="leaderboard-list" class="scrollable-list leaderboard-list">
            <!-- Dynamic Content -->
            <div class="empty-state">天地初开，暂无天骄</div>
          </div>
        </div>

      </section>

      <!-- ==============================================
           BOTTOM SECTION: FOCUS & EVENTS
           ============================================== -->
      <section id="bottom-board" class="dashboard-section">
        
        <!-- Entity Focus Panel -->
        <div class="glass-panel focus-panel">
          <h2 class="section-title" id="focus-title">内观: 未指定</h2>
          <div class="focus-content">
            
            <div class="jindan-container">
               <div class="liquid-sphere">
                  <div id="jindan-liquid" class="liquid"></div>
                  <div class="sphere-glare"></div>
               </div>
               <div class="jindan-stats">
                 <div class="jindan-label">灵力容纳 (Qi)</div>
                 <div class="jindan-value">
                   <span id="focus-qi">0</span> <span class="dim">/</span> <span id="focus-max-qi">0</span>
                 </div>
                 <div class="jindan-percent" id="focus-qi-percent">0%</div>
               </div>
            </div>

            <div class="focus-details">
               <div class="detail-row">
                 <span class="detail-label">战力</span>
                 <span id="focus-power" class="detail-value combat">0</span>
               </div>
               <div class="detail-row">
                 <span class="detail-label">境界</span>
                 <span id="focus-realm" class="detail-value">凡人</span>
               </div>
            </div>

          </div>
        </div>

        <!-- System Logs / Personal Logs -->
        <div class="glass-panel logs-panel">
          <div class="log-tabs">
            <button type="button" class="tab-btn active" data-tab="global">天地异象录</button>
            <button type="button" class="tab-btn" data-tab="personal">个人仙缘</button>
          </div>
          <div class="log-content-container">
            <div id="log-global" class="log-stream active"></div>
            <div id="log-personal" class="log-stream">
               <div class="empty-log">请先在天骄榜点击一名修仙者，以探寻其仙缘轨迹。</div>
            </div>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
